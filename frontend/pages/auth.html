<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <script>
        (function () {
            const theme = localStorage.getItem('bibliodrift_theme');
            if (theme === 'night') {
                document.documentElement.setAttribute('data-theme', 'night');
            }
        })();
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | BiblioDrift</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/style-responsive.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Georgia&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .auth-container {
            max-width: 400px;
            margin: 8rem auto;
            background: var(--book-bg, #fff);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .auth-input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Georgia', serif;
        }

        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: #2c2c2c;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .auth-btn:hover {
            transform: scale(1.03);
            background: #1e3a8a;
            box-shadow: 0 8px 20px rgba(30, 58, 138, 0.3);
        }

        .toggle-link {
            display: block;
            margin-top: 1.5rem;
            color: #666;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: underline;
        }

        #nameField {
            display: none;
        }
    </style>

    <link rel="icon" href="../assets/images/biblioDrift_favicon.png" type="image/png">

    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#2c2420">
</head>

<body style="background: linear-gradient(to bottom right, #f8fafc, #dbeafe); min-height: 100vh;">

    <header>
        <a href="index.html" class="logo">
            <img style="height: 40px"
                src="../assets/images/biblioDrift_favicon.png"
                alt="BiblioDrift Logo">
            BiblioDrift
        </a>
    </header>

    <main>
        <div class="auth-container">

            <h2 id="authTitle"
                style="font-family: 'Playfair Display'; margin-bottom: 2rem;">
                Welcome Back
            </h2>

            <form id="authForm">

                <div id="nameField">
                    <input type="text"
                        id="username"
                        class="auth-input"
                        placeholder="Full Name">
                </div>

                <input type="email"
                    id="email"
                    class="auth-input"
                    placeholder="Email Address"
                    required>

                <input type="password"
                    class="auth-input"
                    placeholder="Password"
                    required>

                <button type="submit"
                    id="submitBtn"
                    class="auth-btn">
                    Sign In
                </button>

            </form>

            <div class="auth-footer">
                <span id="toggleText" class="toggle-link">
                    No account? Create one.
                </span>
            </div>

        </div>
    </main>

    <script>
        const toggleText = document.getElementById('toggleText');
        const authForm = document.getElementById('authForm');
        const authTitle = document.getElementById('authTitle');
        const nameField = document.getElementById('nameField');
        const submitBtn = document.getElementById('submitBtn');

        toggleText.addEventListener('click', () => {
            const isLogin = authForm.dataset.mode !== 'register';

            if (isLogin) {
                authForm.dataset.mode = 'register';
                authTitle.textContent = 'Create Account';
                nameField.style.display = 'block';
                submitBtn.textContent = 'Sign Up';
                toggleText.textContent = 'Already have an account? Sign in.';
            } else {
                authForm.dataset.mode = 'login';
                authTitle.textContent = 'Welcome Back';
                nameField.style.display = 'none';
                submitBtn.textContent = 'Sign In';
                toggleText.textContent = 'No account? Create one.';
            }
        });
    </script>

</body>

</html>
